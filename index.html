<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- Charset & Viewport -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Primary SEO -->
    <title>Codificando Ideias | Templates</title>

    <meta name="description"
          content="Impulsionamos negócios através da tecnologia. Desenvolvemos sites, sistemas, plataformas sob medida e soluções com Inteligência Artificial para empresas que querem crescer.">

    <meta name="keywords"
          content="desenvolvimento de software, sistemas sob medida, inteligência artificial para empresas, criação de sites profissionais, automação de processos, soluções digitais, transformação digital">

    <meta name="author" content="Codificando Ideias">
    <meta name="robots" content="index, follow">
    <meta name="language" content="pt-BR">

    <!-- Canonical -->
    <link rel="canonical" href="https://codificando-ideias.github.io/codificando-ideias/">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://codificando-ideias.github.io/codificando-ideias/">
    <meta property="og:title" content="Codificando Ideias | Impulsionando negócios através da tecnologia">
    <meta property="og:description"
          content="Transformamos ideias em soluções digitais estratégicas. Sites, sistemas, plataformas e Inteligência Artificial para empresas que querem crescer.">
    <meta property="og:image" content="https://codificando-ideias.github.io/codificando-ideias/assets/logo-square-dark-1080.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:locale" content="pt_BR">
    <meta property="og:site_name" content="Codificando Ideias">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Codificando Ideias">
    <meta name="twitter:description"
          content="Soluções digitais sob medida e Inteligência Artificial para empresas que querem crescer.">
    <meta name="twitter:image" content="https://codificando-ideias.github.io/codificando-ideias/assets/logo-square-dark-1080.png">

    <!-- Theme Color -->
    <meta name="theme-color" content="#0B1120">

    <!-- Favicon -->
    <link rel="icon" href="assets/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">

    <!-- Performance -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>

    <!-- Bootstrap 5.3.2 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="css/styles.css" rel="stylesheet">

    <!-- Structured Data (Organization) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Codificando Ideias",
      "url": "https://codificando-ideias.github.io/codificando-ideias/",
      "logo": "https://codificando-ideias.github.io/codificando-ideias/assets/logo-square-dark-1080.png",
      "description": "Empresa especializada em desenvolvimento de sistemas sob medida, soluções digitais estratégicas e Inteligência Artificial aplicada a negócios.",
      "founder": {
        "@type": "Person",
        "name": "Thiago Roock"
      },
      "sameAs": [
        "https://github.com/thiago-roock"
      ]
    }
    </script>
</head>
<body>

<header class="py-4 border-bottom">
  <div class="container">
    <div class="d-flex justify-content-between align-items-start gap-3">
      <div>
        <h1 class="fw-bold">Codificando Templates</h1>
        <p class="text-muted">Biblioteca profissional de templates</p>
      </div>
      <button id="themeToggle" class="btn btn-outline-dark btn-sm" type="button" aria-label="Alternar tema">Dark</button>
    </div>

    <div class="row g-3 mt-3">
      <div class="col-md-6">
        <input type="text" id="searchInput" class="form-control" placeholder="Buscar template...">
      </div>
      <div class="col-md-4">
        <select id="segmentFilter" class="form-select">
          <option value="all">Todos segmentos</option>
        </select>
      </div>
    </div>
  </div>
</header>

<section class="py-5">
  <div class="container">
    <div class="row g-4" id="templateContainer"></div>
  </div>
</section>

<script src="js/script.js"></script>
</body>
</html>
